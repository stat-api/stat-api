# Generated — do not edit. Compile-only: proves every example still builds
# against the published SDKs. No secrets, no live API calls.
name: compile

on:
  push:
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC

jobs:
  typescript:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: typescript } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: npm install
      - run: npx tsc --noEmit

  python:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: python } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt
      - run: python -m compileall .

  go:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: go } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.23" }
      - run: go build ./...

  java:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: java } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "17" }
      - run: gradle compileJava

  csharp:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: csharp } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: "8.0.x" }
      - run: dotnet build
